name: FireHire Caller Reminder

on:
  schedule:
    # كل يوم الساعة 1:00 PM UTC = 3:00 PM Cairo (UTC+2)
    - cron: "0 13 * * *"
  workflow_dispatch: # تشغيل يدوي من GitHub لو احتجت

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run reminder script
        env:
          SPREADSHEET_ID:               ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME:                   ${{ secrets.SHEET_NAME }}
          CALLERS_WEBHOOK_URL:          ${{ secrets.CALLERS_WEBHOOK_URL }}
          DISCORD_TOKEN:                ${{ secrets.DISCORD_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: npm start
